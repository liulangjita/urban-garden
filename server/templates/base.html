<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>城市菜地 - 后台管理</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #f5f5f5; }

        .sidebar {
            position: fixed; left: 0; top: 0; width: 240px; height: 100vh;
            background: linear-gradient(135deg, #2d5a27 0%, #1a3a17 100%);
            color: white; padding: 20px;
        }
        .sidebar h1 { font-size: 20px; margin-bottom: 30px; padding: 10px 0; border-bottom: 1px solid rgba(255,255,255,0.2); }
        .sidebar nav a { display: block; padding: 12px 15px; color: rgba(255,255,255,0.8); text-decoration: none; border-radius: 8px; margin-bottom: 5px; transition: all 0.2s; }
        .sidebar nav a:hover, .sidebar nav a.active { background: rgba(255,255,255,0.15); color: white; }

        .main { margin-left: 240px; padding: 30px; min-height: 100vh; }
        .header { background: white; padding: 20px 30px; border-radius: 12px; margin-bottom: 20px; display: flex; justify-content: space-between; align-items: center; }
        .header h2 { color: #333; font-size: 24px; }
        .header .actions a { background: #2d5a27; color: white; padding: 10px 20px; border-radius: 8px; text-decoration: none; }

        .stats-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; margin-bottom: 30px; }
        .stat-card { background: white; padding: 25px; border-radius: 12px; }
        .stat-card .label { color: #888; font-size: 14px; margin-bottom: 8px; }
        .stat-card .value { font-size: 32px; font-weight: bold; color: #2d5a27; }

        .data-table { background: white; border-radius: 12px; padding: 20px; }
        .data-table table { width: 100%; border-collapse: collapse; }
        .data-table th, .data-table td { padding: 15px; text-align: left; border-bottom: 1px solid #eee; }
        .data-table th { background: #f8f8f8; font-weight: 600; color: #555; }
        .data-table tr:hover { background: #f5f5f5; }
        .status-available { background: #e8f5e9; color: #2e7d32; padding: 4px 12px; border-radius: 4px; font-size: 12px; }
        .status-rented { background: #fff3e0; color: #ef6c00; padding: 4px 12px; border-radius: 4px; font-size: 12px; }
        .btn-edit, .btn-delete { padding: 6px 12px; border-radius: 4px; text-decoration: none; font-size: 12px; margin-right: 5px; }
        .btn-edit { background: #2196f3; color: white; }
        .btn-delete { background: #f44336; color: white; }

        .form-container { background: white; padding: 30px; border-radius: 12px; max-width: 600px; }
        .form-group { margin-bottom: 20px; }
        .form-group label { display: block; margin-bottom: 8px; font-weight: 500; color: #333; }
        .form-group input, .form-group select, .form-group textarea { width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 8px; font-size: 14px; }
        .form-group textarea { min-height: 100px; }
        .form-actions { display: flex; gap: 10px; }
        .btn-save { background: #2d5a27; color: white; padding: 12px 30px; border-radius: 8px; border: none; cursor: pointer; }
        .btn-cancel { background: #f5f5f5; color: #333; padding: 12px 30px; border-radius: 8px; text-decoration: none; }
    </style>
</head>
<body>
    <div class="sidebar">
        <h1>🌱 城市菜地</h1>
        <nav>
            <a href="/" class="{% if active_page == 'dashboard' %}active{% endif %}">📊 仪表盘</a>
            <a href="/plots" class="{% if active_page == 'plots' %}active{% endif %}">🌾 地块管理</a>
            <a href="/gardens" class="{% if active_page == 'gardens' %}active{% endif %}">🏠 园区管理</a>
            <a href="/regions" class="{% if active_page == 'regions' %}active{% endif %}">📍 区域管理</a>
        </nav>
    </div>

    <div class="main">
        {% block content %}{% endblock %}
    </div>
</body>
</html>
